
services:
  metadata-db:
    image: postgres:16.4-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_HOST_AUTH_METHOD: md5
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    shm_size: 24gb
    ports:
      - 22432:5432
    volumes:
      # - .data/metadata-postgres-data:/var/lib/postgresql/data  --> place on faster local disk
      - .data/../:/modyn_all/
      - ./metadata-postgres-data:/var/lib/postgresql/data
      - ./conf/metadata_postgresql.conf:/etc/postgresql/postgresql.conf
      - ./conf/pg_hba.conf:/tmp/pg_hba.conf
      - ./conf/init_pg_hba.sh:/docker-entrypoint-initdb.d/init_pg_hba.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
  storage-db:
    image: postgres:16.4-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_HOST_AUTH_METHOD: md5
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    shm_size: 24gb
    ports:
      - 22431:5432
    volumes:
      # - .data/storage-postgres-data:/var/lib/postgresql/data
      - .data/../:/modyn_all/
      - ./storage-postgres-data:/var/lib/postgresql/data
      - ./conf/storage_postgresql.conf:/etc/postgresql/postgresql.conf
      - ./conf/pg_hba.conf:/tmp/pg_hba.conf
      - ./conf/init_pg_hba.sh:/docker-entrypoint-initdb.d/init_pg_hba.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s

